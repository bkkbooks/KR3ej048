body:
  text: 卷四痘中雜證下痘後癰毒餘毒未盡痘毒生輕則瘡癤重為癰內用解毒湯俱可外敷紅玉膏有功注凡痘後餘毒皆因灌漿之時毒氣大盛未得盡化留藏經絡聚而不散輕則發為瘡癤重即成癰或在肌肉之虛處或發於關節搖動之際皆不論已潰未潰均以解毒內托湯主之外用紅玉膏攤貼患處解毒內托湯生黃耆荊芥防風連翹去心當歸赤芍藥金銀花甘草節木通水煎服方歌解毒內托湯最靈黃耆荊芥共防風連翹當歸赤芍藥銀花甘草與木通紅玉膏紫草一兩紅花一兩當歸二兩黃蠟三兩用香油半斤先將藥炸焦去渣後下黃蠟令勻以冷為度攤貼患處目目病之由風熱成痘毒火鬱上攻睛赤腫澀痛洗肝散翳膜遮睛龍膽從注目病固多由風熱而起也夫痘蘊非常之熱自里達外氣血弱則不能逐毒外出火鬱上攻目斯病矣如赤腫疼痛癮澀流目不能開者以洗肝散主之翳膜遮睛隱澀羞明者加味龍膽湯主之洗肝散羌活歸尾防風山梔仁穀精草薄荷生甘草川芎水煎食後服方歌洗肝散治目痛疼羌活歸尾及防風山梔仁同穀精草薄荷甘草配川芎龍膽湯防風木賊草密蒙花蟬蛻蔓荊子龍膽草菊花黃連白芷蒺藜水煎服方歌翳遮龍膽湯堪誇防風木賊密蒙花蟬蛻蔓荊龍膽菊黃連白芷蒺藜佳唇脾經脈絡繞唇口出痘始終貴潤紅紫裂焦黑急宜治葛根解毒二方從注脾經之脈絡繞於唇口故經曰六腑之華在唇必津液充足氣血和暢唇口方能紅潤故出痘之始終以此為貴不然一為毒火所制則毒乘於中熱熾於外不惟不能紅潤且或赤或紫或焦裂者治皆不可緩也初宜加味升麻葛根湯起脹後則以黃連解毒湯治之加味升麻葛根湯赤芍梔子藿香升麻葛根生甘草防風石膏水煎服方歌加味升麻葛根湯赤芍梔子與藿香升麻葛根生甘草防風石膏共煎嘗黃連解毒湯方見結痂落痂證治痘後牙疳痘後牙疳毒熱攻口臭齦腫多痛疼內服清熱涼血飲外敷中白散極靈注痘後生牙疳者乃餘毒未解上攻牙齒而然也初起口臭齦腫牙縫出血尚覺疼痛甚則色黑腐爛牙齒脫落穿腮破頰蝕透鼻唇多至不救見之須急急調治內服清毒涼血飲外敷人中白散清毒涼血飲知母石膏生地黃連當歸赤芍大黃山梔子丹皮荊芥穗連翹去心水煎服方歌清毒涼血治牙疳知母石膏生地連歸芍大黃山梔子丹皮荊穗連翹煎人中白散人中白煅二錢雄黃八分冰片四分硼砂青黛兒茶各一錢共為細末搽敷患處舌舌乃心苗五內通毒火一犯先見形赤紫黑腫並舒弄總以清熱犀角平注舌為心苗內通五臟毒熱舉發舌先受之或赤或紫或黑或腫舒舌弄舌種種不一要皆熱留於心而使然也治宜清熱為主以加味犀角湯治之加味犀角湯荊芥防風牛蒡子炒生甘草桔梗升麻犀角麥冬去心梔子黃連石膏煅水煎服方歌加味犀角能散熱荊防牛蒡同甘桔升麻犀角麥門冬梔子黃連石膏捷咽喉咽喉之地司出入毒火沖熾痛難堪內用甘桔利咽劑外吹牛黃散即安注咽者飲食之道喉者呼吸之門乃最緊要之處若痘毒不能發越於外火熱壅塞膈間上衝咽喉則或腫痛或啞嗆甚而不能呼吸飲食難入速用加味甘桔湯治之或用加減利咽解毒湯外用牛黃散吹入腫處加味甘桔湯方見失音利咽解毒湯防風山豆根麥冬去心牛蒡子炒黑參苦桔梗生甘草緑豆水煎服方歌利咽解毒用防風山豆根與麥門冬牛蒡黑參苦桔梗甘草緑豆共煎濃牛黃散川黃連生黃柏生薄荷各八分雄黃火硝青黛各二分半牛黃冰片硼砂硃砂各一分共為細末每用少許吹患處夾疹痘中夾疹因時氣毒火觸動發其機臨期休將痘瘡治速將升葛透疹宜注痘已見形其中又有顆粒細密如麻子者此夾疹也因出痘時恰遇天行時疫感受其氣一時併發不須治痘當先治疹以升麻葛根湯加荊芥防風蟬蛻牛蒡犀角疹散而痘自起矣升麻葛根湯方見發熱證治夾癍片片結就如雲頭毒傷陰血浮火遊表散荊防敗毒劑清熱黃連解毒投注癍乃血之餘也因毒火鬱遏傷於陰血血熱相搏故浮遊之火散布皮膚之間與痘相夾而出片片如雲頭突起謂之夾癍以荊防敗毒散主之七日後見此謂之發癍乃血熱不故也以黃連解毒湯主之荊防敗毒散羌活獨活柴胡前胡荊芥防風生甘草川芎枳殼麩炒桔梗赤茯苓引用生薑水煎服方歌夾癍宜用疏解劑荊防敗毒進莫遲羌獨柴前荊防草川芎枳桔赤苓宜黃連解毒湯方見結痂落痂證治夾痧痧形發時粟一般顆硬形圓頂又尖粒中含水清漿樣敗毒調治自然安注痧亦疹類但形如粟米尖圓自硬內含清水為異此亦熱毒所發往往夾痘而出宜於疏散以荊防敗毒散主之荊防敗毒散方見夾癍水痘水痘皆因濕熱成外證多與大痘同形圓頂尖含清水易脹易靨不漿膿初起荊防敗毒散加味導赤繼相從注水痘發於脾肺二經由濕熱而成也初起與大痘相似面赤唇紅眼光如水咳嗽噴嚏唾涕稠黏身熱二三日而始出其形尖圓而大內含清水易脹易靨不作膿漿初起荊防敗毒散主之繼以加味導赤散治之荊防敗毒散方見夾癍加味導赤散生地木通生甘草連翹黃連滑石赤苓麥冬去心引用燈心水煎服方歌加味導赤除濕熱生地木通甘草協翹連滑石苓麥冬引加燈心稱妙訣男婦年長出痘門男子年長出痘年長出痘總不宜真陰虧損元氣虛一逢出痘毒沖熾水不勝火豈能支夾熱參麥清補劑攻漿參歸鹿茸宜注男子自十六歲後皆謂之年長嗜欲情開元精走泄又遇痘毒之火沖熾則真陰虧損水虛不能制火故每至行漿之際口渴心煩鼻衄咽痛不能成膿結痂者有之治者不可妄用寒涼五六日前只宜參麥清補湯調治至七八日如膿漿不行急宜攻漿以參歸鹿茸湯內調雞冠血酒治之但得漿行庶可無虞參麥清補湯當歸川芎花粉白芍酒炒生地人參生黃耆前胡桔梗牛蒡子炒研生甘草紅花南山楂麥冬去心引用生薑水煎服方歌參麥清補用歸芎花粉白芍生地同參耆前桔牛蒡草紅花山楂麥門冬參歸鹿茸湯方見灌漿證治雞冠血酒方見灰陷白陷婦女出痘行經婦女發痘遇經行當期毒解不須驚非期涼血解毒治過期四物解毒從去血過多氣血弱十全大補服通靈注女子出痘或遇經行須問其是期非期如期而出者則毒熱隨血解去不須施治其證自愈若非期而至者此毒火內擾於胞中致血妄行以涼血解毒湯治之若過期不止乃毒熱乘入血室以四物解毒湯加元參甘草主之若行漿時去血過多此氣血虛弱不能統攝也急用十全大補湯治若稍緩痘漿不行則無救矣涼血解毒湯方見結痂落痂證治四物解毒湯當歸白芍酒炒生地元參梔子炒川芎生甘草黃連酒炒黃柏酒炒黃芩酒炒水煎服方歌四物解毒湯如神歸芍生地共元參梔子川芎生甘草黃連黃柏共黃芩十全大補湯方見結痂落痂證治孕婦出痘妊娠出痘勢最難母子相連掌握間審其所因隨證治如聖安胎效通仙注孕婦最忌出痘蓋熱能動胎胎落則氣血因之而傷又安望其起脹灌漿結痂耶故遇孕婦出痘始終以安胎為上用如聖散隨證加減治之不可輕用犯胎之藥致有觸動如聖散當歸身陳皮白朮土炒大腹皮黃芩縮砂仁連殼炒甘草生黑豆酒洗桑上羊兒藤水煎服初發熱加升麻葛根連翹出而稠密者加酒炒黃連牛蒡子連翹南山楂不起發者加牛蒡子赤芍藥渴加麥門冬知母花粉血動者四物湯加芩連脾虛食少毒發不出者千金內托湯去肉桂倍加參耆身熱有外邪者參蘇飲加木香方歌安胎如聖散最宜歸陳白朮大腹皮黃芩砂仁共甘草黑豆羊藤服莫疑痘出遇産痘出正盛逢臨産束手無策勢最險無羌十全大補治惡露未盡黑神散注孕婦當痘正出之際忽然欲産俟産育後無他恙者只宜大補氣血十全大補湯主之若腹中微痛此惡露未盡也黑神散主之十全大補湯方見結痂落痂證治黑神散當歸川芎熟地黃青皮醋炙香附醋炙蒲黃桂心乾薑水煎溫服方歌惡露未淨黑神良當歸川芎熟地黃青皮香附俱醋炙蒲黃桂心合乾薑産後出痘産後如逢出痘瘡惟憑補益莫驚慌十全大補全功效勿用寒涼致損傷注婦人産後氣血已傷又遇出痘則氣血之供用難給不能領載其毒惟宜大補氣血以十全大補湯治之切不可妄用寒涼之劑致傷生髮之機也十全大補湯方見結痂落痂證治疹門疹原麻為正疹亦胎毒毒伏六腑感而出初發之狀有類痘形尖漸密不漿殊始終調護須留意較痘雖輕變化速注疹非一類有瘙疹癮疹溫疹蓋痘疹皆非正疹也惟麻疹則為正疹亦胎元之毒伏於六腑感天地邪陽火旺之氣自肺脾而出故多咳嗽噴嚏鼻流清涕眼淚汪汪兩胞浮腫身熱二三日或四五日始見點於皮膚之上形如麻粒色若桃花間有類於痘大者此麻疹初發之狀也形尖疏稀漸次稠密有顆粒而無根暈微起泛而不生漿此麻疹見形之後大異於痘也須留神調治始終不可一毫疏忽較之於痘雖稍輕而變化之速則在頃刻也麻疹輕重麻疹出時非一端其中輕重要詳參氣血和平輕而易表裡交雜重則難注麻疹出時有輕重之分臨時須要詳察若氣血和平素無他病者雖感時氣而正能制邪故發熱和緩微微汗出神氣清爽二便調勻見點則透徹散沒不疾不徐為輕而易治者也若素有風寒食滯表裡交雜一觸邪陽火旺之氣內外合發而正不能制邪必大熱無汗煩躁口渴神氣不清便閉尿澀見點不能透徹收散或太緊速則為重而難治者也麻疹主治大法疹宜發表透為先最忌寒涼毒內含已出清利無餘熱沒後傷陰養血痊注凡麻疹出貴透徹宜先用表發使毒盡達於肌表若過用寒涼冰伏毒熱則必不能出透多致毒氣內攻喘悶而斃至若已出透者又當用清利之品使內無餘熱以免疹後諸證且麻疹屬陽熱甚則陰分受傷血為所耗故沒後須以養血為主可保萬全此首尾治疹之大法至於臨時權變惟神而明之而已麻疹未出證治欲出麻疹身微熱表裡無邪毒氣松若兼風寒食滯熱隱伏不出變從生宣毒發表為主劑隨證加味莫亂從注麻疹一證非熱不出故欲出時身先熱也表裡無邪者熱必和緩毒氣鬆動則易出而易透若兼風寒食熱諸證其熱必壯盛毒氣鬱閉則難出而難透治以宣毒發表湯其間或有交雜之證亦照本方隨證加減治之宣毒發表湯升麻葛根前胡桔梗枳殼麩炒荊芥防風薄荷葉木通連翹去心牛蒡子炒研淡竹葉生甘草引加芫荽水煎服感寒邪者加麻黃夏月勿用食滯加南山楂內熱加黃芩方歌疹伏宣毒發表湯升葛前桔梗荊防薄通翹蒡淡竹草引加芫荽水煎嘗麻疹見形證治麻疹已出貴透徹細密紅潤始為良若不透徹須分晰風寒毒熱氣虛詳風寒升葛湯加味毒熱三黃石膏湯氣虛人參敗毒散托裡透疹效非常注麻疹見形貴乎透徹出後細密紅潤則為佳美有不透徹者須察所因如風寒閉塞必有身熱無汗頭疼嘔惡疹色淡紅而黯之證宜用升麻葛根湯加蘇葉川芎牛蒡子因毒熱壅滯者必面赤身熱譫語煩渴疹色赤紫滯黯宜用三黃石膏湯又有正氣虛弱不能送毒外出者必面色㿠白身微熱精神倦怠疹色白而不紅以人參敗毒散主之升麻葛根湯方見痘門發熱證治三黃石膏湯麻黃石膏淡豆豉黃柏黃連梔子黃芩水煎服方歌疹出不透因毒熱三黃石膏湯急尋麻黃石膏淡豆豉黃柏黃連梔子芩人參敗毒散人參川芎羌活獨活前胡枳殼麩炒桔梗柴胡生甘草赤苓引用生薑水煎服方歌疹因氣虛出難透人參敗毒有奇功參芎羌獨前枳桔柴胡甘草赤茯苓麻疹收沒證治疹出三日當收沒不疾不徐始無虞收沒太速毒攻內當散不散虛熱醫毒盛荊防解毒治外用胡荽酒法宜虛熱柴胡四物劑應證而施病漸離注麻疹見形三日之後當漸次沒落不疾不徐始為無病若一二日疹即收沒此為太速因調攝不謹或為風寒所襲或為邪穢所觸以致毒反內攻輕則煩渴譫狂重則神昏悶亂急宜內服荊防解毒湯外用胡荽酒熏其衣被使疹透出方保無虞當散不散者內有虛熱留滯於肌表也其證潮熱煩渴口燥咽乾切不可純用寒涼之劑以柴胡四物湯治之使血分和暢餘熱悉除疹即沒矣荊防解毒湯薄荷葉連翹去心荊芥穗防風黃芩黃連牛蒡子炒研大青葉犀角人中黃引用燈心蘆根水煎服方歌收沒太速毒內攻荊防解毒治最靈薄翹荊防芩連蒡大青犀角共人中胡荽酒方見痘門水泡證治柴胡四物湯白芍炒當歸川芎生地人參柴胡淡竹葉地骨皮知母炒黃芩麥冬去心引加生薑紅棗水煎服方歌當散不散因虛熱柴胡四物芍歸芎生地人參柴竹葉地骨知母芩麥冬身熱不退麻疹已發身猶熱毒熱壅遏使之然出用化毒清表劑沒後柴胡清熱煎注麻疹非熱不出若既出透其熱當減倘仍大熱者此毒盛壅遏也宜用化毒清表湯治之疹已沒落而身熱者此餘熱留於肌表也宜柴胡清熱飲治之化毒清表湯葛根薄荷葉地骨皮牛蒡子炒研連翹去心防風黃芩黃連元參生知母木通生甘草桔梗引用生薑燈心水煎服方歌疹已出透身壯熱化毒清表為妙訣葛薄地骨蒡翹防芩連元知通甘桔柴胡清熱飲柴胡黃芩赤芍生地麥冬去心地骨皮生知母生甘草引用生薑燈心水煎服方歌疹已沒落熱不減柴胡清熱效通仙柴胡黃芩芍生地麥冬地骨知母甘煩渴注毒熱內盛火上炎心胃擾亂煩渴添未出升葛湯加味已出白虎湯為先沒落竹葉石膏用因時醫治莫遲延注凡出麻疹煩渴者乃毒熱壅盛也蓋心為熱擾則煩胃為熱鬱則渴當未出時宜升麻葛根湯加麥冬天花粉已出者宜白虎湯沒後煩渴者用竹葉石膏湯升麻葛根湯方見痘門發熱證治白虎湯石膏煅生知母生甘草引用粳米水煎服方歌麻疹已發多煩渴白虎清熱自能安石膏知母生甘草引加粳米用水煎服竹葉石膏湯人參麥冬去心石膏煅生知母竹葉生甘草水煎服方歌疹已沒落當安靜若加煩渴熱未清竹葉石膏湯參麥石膏知母竹甘從譫妄疹發最怕毒火盛熱昏心神譫妄生未出三黃石膏治已出黃連解毒靈注譫妄一證乃毒火太盛熱昏心神而然也疹未出而譫妄者三黃石膏湯主之疹已出而譫妄者黃連解毒湯主之三黃石膏湯方見麻疹見形證治黃連解毒湯方見痘門結痂落痂證治喘急疹初無汗作喘急宣發麻杏石甘宜毒熱內攻金受克保肺清氣化毒醫注喘為惡候麻疹尤忌之如初出未透無汗喘急者此表實拂鬱其毒也宜用麻杏石甘湯發之疹已出胸滿喘急此毒氣內攻肺金受克宜用清氣化毒飲清之若遲延失治以致肺葉焦舉則難求矣麻杏石甘湯石膏煅麻黃蜜妙杏仁去皮尖炒生甘草用引用生薑水煎服方歌喘用麻杏石甘湯石膏火煅合麻黃杏仁去尖須微炒甘草相配引生薑清氣化毒飲前胡桔梗栝蔞仁連翹去心桑皮炙杏仁炒去皮尖黃芩黃連元參生甘草麥冬去心引用蘆根水煎服方歌毒熱內攻肺喘滿清氣化毒飲最靈前桔栝蔞翹桑杏苓連元參草麥冬咳嗽疹初咳嗽風邪郁加味升麻葛根良毒熱熏蒸金受制清金寧嗽自堪嘗注麻疹發自脾肺故多咳嗽若咳嗽太甚者當分初沒治之初起咳嗽此為風邪所郁以升麻葛根湯加前胡桔梗蘇葉杏仁治之已出咳嗽乃肺為火灼以清金寧嗽湯主之升麻葛根湯方見痘門發熱證治清金寧嗽湯橘紅前胡生甘草杏仁去皮尖炒桑皮蜜炙川連栝蔞仁桔梗浙貝母去心引用生薑紅棗水煎服方歌嗽用清金寧嗽湯橘紅前草杏仁桑川連栝蔞桔貝母引用紅棗共生薑喉痛疹毒熱甚上攻喉腫痛難堪實可憂表邪元參升麻用裡熱涼膈消毒求注疹毒熱盛上攻咽喉輕則腫痛甚則湯水難下最為可慮表邪郁遏疹毒不能發舒於外致咽喉作痛者元參升麻湯主之裡熱壅盛或疹已發於外而咽喉作痛以涼膈消毒飲主之元參升麻湯荊芥防風升麻牛蒡子炒研元參生甘草水煎服方歌表郁疹毒喉腫痛急服元參升麻湯荊芥防風升麻蒡元參甘草水煎嘗涼膈消毒飲荊芥穗防風連翹去心薄荷葉黃芩生梔子生甘草牛蒡子炒研芒硝大黃生引用燈心水煎服方歌裡熱喉痛苦難當涼膈消毒飲最良荊防翹薄芩梔草牛蒡芒硝生大黃失音疹毒聲啞肺熱壅元參升麻大有功已發加減涼膈散沒後兒茶音即清注失音者乃熱毒閉塞肺竅而然也疹初失音者元參升麻湯主之疹已發而失音者加減涼膈散主之疹沒後聲啞者兒茶散主之元參升麻湯方見喉痛加減涼膈散薄荷葉生梔子元參連翹去心生甘草苦桔梗麥冬去心牛蒡子炒研黃芩水煎服方歌加減涼膈治失音薄荷梔子共元參連翹甘草苦桔梗麥冬牛蒡與黃芩兒茶散硼砂二錢孩兒茶五錢共為細末涼水一盞調藥一匙服之嘔吐疹發緣何嘔吐逆火邪擾胃使之然竹茹石膏為主治和中清熱吐能安注麻疹嘔吐者由於火邪內迫胃氣衝逆也須以竹茹石膏湯和中清熱其吐自止竹茹石膏湯半夏薑製赤苓陳皮竹茹生甘草石膏煅引用生薑水煎服方歌竹茹石膏湯治吐半夏薑製配茯苓陳皮竹茹生甘草石膏火煅共合成瀉泄毒熱移入大腸經傳化失常瀉泄成初起升葛湯加味已發黃連解毒清注麻疹瀉泄乃毒熱移入腸胃使傳化失常也治者切不可用溫熱諸劑疹初作瀉者以升麻葛根湯加赤苓豬苓澤瀉主之疹已出作瀉者以黃連解毒湯加赤苓木通主之升麻葛根湯方見痘門發熱證治黃連解毒湯方見痘門結痂落痂證治痢疾夾疹之痢最難當毒熱凝結移大腸腹痛下痢赤白色悉用清熱導滯良注麻疹作痢謂之夾疹痢因毒熱未解移於大腸所致也有腹痛欲解或赤或白與赤白相兼者悉用清熱導滯湯主之不可輕投澀劑清熱導滯湯山楂厚朴薑炒生甘草枳殼麩炒檳榔當歸白芍酒炒條芩酒炒連翹去心牛蒡子炒研青皮炙黃連吳茱萸炒引用生薑水煎服方歌痢用清熱導滯湯山楂朴草殼檳榔歸芍條芩翹牛蒡青皮黃連引生薑腹痛小兒發疹腹中疼毒郁腸胃食滯凝曲腰啼叫眉頻蹙加味平胃散堪行注麻疹腹痛者由食滯凝結毒氣不得宣發於外故不時油腰啼叫兩眉頻蹙須以加味平胃散治之滯消毒解而痛自除矣加味平胃散防風升麻枳殼麩炒葛根蒼朮炒陳皮厚朴薑炒南山楂麥芽炒生甘草引用生薑燈心水煎服方歌加味平胃散如神防風升麻枳葛根蒼陳厚朴楂芽草生薑燈心水煎勻衄血疹家衄血莫倉惶毒從衄解妙非常衄甚吹鼻發灰散內服犀角地黃湯注肺開竅於鼻毒熱上衝肺氣載血妄行則衄作矣然衄中有發散之義以毒從衄解不須止之但不可太過過則血脫而陰亡也如衄甚者宜外用發灰散吹入鼻中內服犀角地黃湯其血可止發灰散犀角地黃湯方俱見痘門衄血便血瘙疹兒在母腹血熱蒸生後不免遇涼風遍體發出如粟米此名瘙疹何須評注瘙疹者兒在胎中受母血熱之氣所蒸已久及生後外遇涼風以致遍身紅點如粟米之狀滿月內見者名為爛衣瘡百日內見者又名百日瘡未出痘瘡之先見者即名為瘙疹調攝謹慎不治自愈蓋痘疹痘後出疹蓋痘傳餘毒未盡夾食寒遍身作癢如雲片加味消毒服即安注蓋痘疹者謂痘方愈而疹隨發也因痘後餘毒未盡更兼恣意飲食外感風寒以致遍身出疹色赤作癢始如粟米漸成云片宜加味消毒飲疏風清熱疹即愈矣加味消毒飲荊芥穗防風牛蒡子炒升麻生甘草赤芍南山楂連翹去心引用生薑水煎服方歌蓋痘疹因風熱成加味消毒飲最靈荊防牛蒡升麻草赤芍山楂連翹從癮疹心火灼肺風濕毒隱隱疹點發皮膚疏風散濕羌活散繼用消毒熱盡除注癮疹者乃心火灼於肺金又兼外受風濕而成也發必多癢色則紅赤隱隱於皮膚之中故名曰癮疹先用加減羌活散疏風散濕繼以加味消毒飲清熱解毒表裡清而疹愈矣加味羌活散羌活前胡薄荷葉防風川芎枳殼麩炒桔梗蟬蛻連翹去心生甘草赤苓引用生薑水煎服方歌癮疹羌活散相當羌活前胡薄荷防川芎枳桔淨蟬蛻連翹甘草赤苓薑加味消毒飲方見蓋痘疹
