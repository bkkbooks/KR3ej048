body:
  text: 卷三痘中雜證上發熱表熱無汗升麻湯裡熱有汗消毒良行漿毒蒸清毒劑結後餘熱連翹方注痘之一證始終不可盡除其熱蓋熱非壯熱乃和緩之熱也以寒則收縮熱則宣發故初不熱則出不齊脹不熱則漿不行收不熱則痂不結自初出以至起脹時皮膚乾燥發熱無汗此熱在表也升麻葛根湯加荊芥穗防風主之蒸熱有汗此熱在裡也加減消毒飲主之至行漿時熱不減者此為毒熱熏蒸宜用清毒活血湯便秘者去人參黃耆加酒炒大黃至結痂後發熱壯盛胸腹手足俱熱二便秘澀者此為餘毒過盛宜用大連翹飲治之升麻葛根湯方見發熱證治加減消毒飲升麻牛蒡子炒研山豆根紫草連翹去心生地黃赤芍川黃連甘草生引用燈心水煎服方歌加減消毒飲如神升麻牛蒡山豆根紫草連翹生地芍黃連甘草引燈心清毒活血湯方見灌漿證治大連翹飲方見收靨證治驚搐未見點搐清解方已見猶搐導赤良靨後虛搐寧神劑食蒸發搐大安康注驚痘者多緣痘毒之火觸動心神移熱於肝肝風與心火相搏遂成是證治法須別始終如痘未出而先發搐者不可純用寒涼壅閉其毒惟以清解散疏散表邪痘出而搐自止矣若痘已見形仍抽搐不止者此毒火內伏心經也宜用導赤散加黃連治之靨後發抽者是真氣虛弱火邪內攻以寧神湯主之痘後食蒸發搐者此脾胃虛弱必面黃潮熱大便酸臭宜木香大安丸治之清解散方見發熱證治導赤散木通生地黃淡竹葉甘草梢引用燈心水煎服方歌痘已見形仍作驚導赤散治最有功木通生地竹葉草黃連加入效通靈寧神湯人參生地黃麥門冬去心梔子仁炒黃連酒炒石菖蒲當歸身甘草炙辰砂引用燈心水煎服方歌寧神湯內用人參生地麥冬山梔仁黃連菖蒲歸身草辰砂調服功極神木香大安丸山楂肉麥芽炒神麯炒各一兩枳實麩炒六錢白朮土炒一兩萊菔子炒四錢連翹去心五錢黃連姜炒三錢木香煨三錢縮砂仁五錢陳皮八錢上為細末水泛為丸炒陳倉米湯下量兒大小用之頭痛痘中頭痛最堪驚毒衝風熱兩分明稠密壯熱連翹飲疏稀微熱清解靈注頭痛者乃邪氣與真氣相搏壅遏毒氣上干清道而然也故毒熱上騰與風熱鬱閉皆能為害如頭面痘出稠密身體壯熱悶亂昏痛者此毒火上騰也以大連翹飲主之若頭面痘出稀疏微覺身熱頭痛者此風熱鬱閉也宜清解散治之大連翹飲方見收靨證治清解散方見發熱證治腰痛痘當未出腰先痛毒火亢極陰難勝瀉毒不使傳腎經加味歸宗宜速用注凡痘發熱時而腰痛者最為惡候蓋腰為腎之府也毒火亢極真陰不能勝邪故頻頻作痛須用加味歸宗湯速瀉其毒不使傳於腎經庶可望生治若少緩毒火沖熾痘必乾枯紫黑腎陰絕則難救矣加味歸宗湯當歸尾赤芍藥元參大黃生羌活荊芥穗青皮炒穿山甲炙生地東山楂牛蒡子炒研木通水煎服方歌加味歸宗治腰疼歸芍元參大黃生羌穗青皮穿山甲生地山楂蒡木通腹痛小兒發熱腹痛疼表郁芍藥防風從里郁加味平胃散陰鬱桂枝大黃靈注凡出痘腹痛有因風寒鬱結痘出不快煩躁而痛者乃表邪所郁以芍藥防風湯主之有因食滯鬱塞痘出之時原無腹痛忽然一時作痛者此為里郁宜加味平胃散治之又有初起因毒熱鬱於陰分痛在臍下時作時止者此屬陰鬱以桂枝大黃湯主之芍藥防風湯升麻防風陳皮桔梗川芎白芍藥炒甘草生厚朴姜炒枳實麩炒引用生薑水煎服方歌芍藥防風解表宜升麻防風共陳皮桔梗川芎白芍藥甘草厚朴合枳實加味平胃散陳皮厚朴姜炒神麯炒南蒼朮米泔水浸炒麥芽炒甘草生香附米制南山楂引用生薑水煎服方歌加味平胃治食傷陳皮厚朴神麯蒼麥芽甘草香附米山楂同煎引生薑桂枝大黃湯生大黃桂枝生甘草生白芍引用生薑水煎服方歌桂枝大黃療陰鬱生軍泄熱效非常散寒桂枝調中草白芍和中順氣強煩躁未出煩躁消毒平已出煩躁涼血寧漿清發煩保元治靨後虛煩四物靈注痘證始終以安靜為吉但有煩躁必生他變蓋煩者心憤也躁者身擾也皆由毒火太盛神不能靜也痘未出而煩躁是為表郁以消毒飲主之痘已出而煩躁是為血熱以涼血解毒湯主之若養漿時頂平清稀而煩躁是氣虛也以加味保元湯主之收靨後而煩躁是血虛也以加減四物湯主之加減消毒飲方見雜證中發熱涼血解毒湯方見結痂落痂證治加味保元湯人參黃耆制甘草炙當歸酒洗白芍藥炒麥冬去心棗仁炒研水煎服方歌加味保元治虛煩人參黃耆甘草攢酒洗當歸白芍藥麥冬棗仁一同煎加減四物湯人參當歸麥門冬去心生地梔子炒白芍藥炒水煎服方歌靨後血虛多煩躁加減四物湯最妙人參當歸麥門冬生地梔子白芍藥譫妄毒熱熾盛犯心經錯語妄言神不清妄見妄聞志昏憒黃連解毒服即寧注譫妄者由毒熱熾盛上干心氣致使錯語妄言神氣不清妄見妄聞志氣昏憒以黃連解毒湯主之黃連解毒湯方見結痂落痂證治渴初熱大渴解毒湯血熱煎耗涼血良成漿津泄麥冬散靨後傷津生脈強注渴由毒火燔灼內傷津液而作也如初發熱即大渴者裡熱盛也宜葛根解毒湯治之痘出稠密色豔作渴者此血熱毒盛也涼血解毒湯主之成漿津液外泄而作渴者人參麥冬散主之靨後脾虛內傷津液而作渴者生脈六均湯主之葛根解毒湯葛根升麻天花粉甘草生麥門冬去心生地茅根引用燈心水煎服方歌葛根解毒湯清熱津液上潮火自泄升葛花粉生甘草麥冬生地茅根列涼血解毒湯方見結痂落痂證治人參麥冬散人參白朮土炒甘草生葛根粉煨麥冬去心升麻引用糯米水煎服方歌人參麥冬效通仙津液外泄治易痊參朮甘草煨葛粉麥冬升麻糯米煎生脈六均湯人參五味子麥門冬去心陳皮半夏薑製茯苓白朮土炒甘草炙引用烏梅水煎服方歌生脈六均醫脾弱泄瀉傷津大渴作人參五味麥門冬陳半苓朮甘草合厥逆爪白便清厥屬寒木香理中湯可痊爪紫便赤為熱厥金花承氣乃良煎注痘中厥逆之證有因氣血虛寒發厥者有因毒熱鬱閉發厥者爪甲色白小便清利其痘色更見灰陷瀉泄不食等證此外陽衰內陰盛乃寒厥也以加減陳氏木香散主之寒甚者附子理中湯主之若爪甲色紅小便赤澀其痘色更見紫黑煩躁悶亂等證此係陽毒內攻熱極反寒是熱厥也宜梔子金花湯治之裡實者承氣湯下之加減陳氏木香散人參肉桂茯苓半夏薑製白朮土炒丁香肉豆蔻麵裹煨甘草炙訶子肉麵裹煨木香煨引用生薑水煎服方歌木香散療中外寒參桂茯苓半夏攢白朮丁香肉豆蔻甘草訶子木香研附子理中湯人參附子制甘草炙白朮土炒乾薑水煎服方歌附子理中治虛寒中外無陽莫留連人參附子炙甘草白朮乾薑一同煎梔子金花湯黃芩黃連黃柏大黃梔子水煎服方歌熱厥梔子金花湯熱極反寒服最良黃芩黃連並黃柏大黃梔子共煎嘗承氣湯厚朴姜炒枳實麩炒大黃水煎服方歌承氣湯能除火熱裡實不便毒氣結厚朴枳實川大黃煎服便利毒即泄喘風寒客肺杏蘇先痰熱涼膈白虎煎泄瀉聲微參朮劑倒靨作喘歸茸痊注五臟之氣皆統於肺若為邪干則肺氣窒塞氣道不利故發為喘也實者聲粗有力而長虛者聲微無力而短痘初發熱以至既出之後或噴嚏頻頻或鼻流清水此風寒客肺而喘也杏蘇飲主之有食熱痰積上衝作喘者此火炎肺金也宜涼膈白虎湯治之泄瀉後元氣下陷此脾氣不足而喘也人參白朮散主之有痘漿灌至半足忽倒靨而喘者此中氣大虧也參歸鹿茸湯主之杏蘇飲蘇葉枳殼麩炒桔梗葛根前胡陳皮甘草生半夏姜炒杏仁炒去皮尖茯苓引用生薑水煎服方歌杏蘇飲治肺傷風蘇葉枳桔葛根從前胡陳皮生甘草半夏杏仁白茯苓涼膈白虎湯薄荷連翹去心石膏生知母生黃芩甘草生梔子大黃朴硝引用粳米水煎服方歌涼膈白虎治火喘薄荷連翹共石膏知母黃芩生甘草梔子大黃配朴硝人參白朮散藿香白朮土炒葛根木香煨甘草炙白茯苓人參引用生薑水煎服方歌脾虛白朮散如神藿香白朮共葛根木香甘草茯苓配人參加入扶元真參歸鹿茸湯方見灌漿證治痰痰因津液貯留生痘瘡之火煉而成加味二陳斟酌用灌漿保元化毒寧注痰乃津液貯留胸中而生蓋痘毒之火耗煉其津液上壅氣道喉中作聲宜清氣化痰不可驟用金石之藥恐傷真氣以加味二陳湯治之若灌漿時見此證則禁用二陳湯但於助漿劑中少佐清氣化痰之品如保元化毒湯加橘紅貝母桔梗麥冬甚妥加味二陳湯麥門冬去心前胡栝蔞仁陳皮半夏薑製茯苓甘草生枳殼麩炒桔梗杏仁炒去皮尖黃芩引用生薑水煎服方歌痘證多痰宜二陳麥冬前胡栝蔞仁陳皮半夏茯苓草枳桔杏仁共黃芩保元化毒湯方見起脹證治咳嗽毒熱熏蒸火灼金肺氣上逆咳嗽頻初熱見點杏蘇飲收靨清膈二陳神注咳嗽者有聲有痰也因痘毒之火上熏於肺故氣逆而發為咳嗽如初發熱見此者宜杏蘇飲主之偶感風寒者亦用此藥自起脹至成漿而咳嗽者由喉間有痘道路窄狹痘收自愈不必服藥結靨後咳嗽者乃衛氣虛弱腠理開張或因風寒者均宜人參清膈散治之因餘熱者宜加味二陳湯治之杏蘇飲方見喘證人參清膈散人參黃耆生茯苓白朮土炒黃芩當歸白芍微炒知母生桔梗甘草生柴胡滑石飛紫菀地骨皮桑皮炒引用生薑水煎服方歌清膈散療靨後咳參耆苓朮苓歸芍知桔甘草柴滑石紫菀地骨桑皮合加味二陳湯方見痰證乾噦痘瘡乾噦病勢沉毒熱上逆正難禁實熱橘皮竹茹劑虛寒丁香柿蒂神注乾噦者有聲無物其聲重大而長屬陽明胃經也緣毒熱上逆所致又有胃氣不足不能容受復有寒邪客於胃中使胃氣不能中主上行而噦也熱者橘皮竹茹湯主之寒者丁香柿蒂湯主之橘皮竹茹湯橘紅半夏薑製麥門冬去心枇杷葉姜炙甘草生竹茹赤苓人參引用蘆根水煎服方歌橘皮竹茹湯如神專醫胃熱嘔逆頻橘半麥冬枇杷草竹茹赤苓與人參丁香柿蒂湯丁香人參高良薑柿蒂水煎服方歌丁香柿蒂湯治寒胃氣上逆不得安丁香良薑人參共更入柿蒂一同煎嘔吐毒盛嘔吐二陳良吞嚥不利鼠黏湯傷食吐酸大安效氣虛作嘔和胃方注嘔者有物有聲吐者有物無聲二證皆屬於胃痘初出嘔吐者是火邪犯胃毒氣上騰痘必紅紫宜梔連二陳湯自起脹至收靨嘔吐者是瘡集咽門吞嚥不利所致須用鼠黏子湯若傷食嘔吐者吐必腥酸宜用木香大安丸設吐後精神困倦不思飲食乃胃氣虛也以參砂和胃湯主之梔連二陳湯陳皮半夏薑製茯苓甘草生梔子姜炒川黃連姜炒引用生薑水煎服方歌毒氣衝胃吐頻頻醫治須宜用二陳陳半茯苓生甘草梔連姜炒效如神加味鼠黏子湯桔梗射干連翹去心荊芥防風山豆根鼠黏子炒研乾葛水煎服方歌加味鼠黏湯極合桔梗射干同連翹荊芥防風山豆根鼠黏子炒配乾葛木香大安丸方見驚搐參砂和胃湯人參白朮土炒藿香茯苓陳皮半夏薑製縮砂仁甘草炙引用煨姜水煎服方歌虛吐參砂和胃湯人參白朮共藿香茯苓陳皮製半夏縮砂甘草引煨姜嗆水毒壅會厭水難納溢水氣喉嗆始發咽喉腫痛道路狹甘桔解毒皆妙法注嗆水者因火盛毒壅會厭門也蓋咽門司納飲食一為毒熱所壅則必腫痛水不易入溢於氣喉故氣噴出而嗆作矣宜用加味甘桔湯或加味解毒湯亦可此證見於七日前者俱屬惡候若七日已後外痘蒸長光潤而作嗆者是咽門痘長壅窒道路而使然也至結痂則嗆自止治者當於毒盛之痘預用清理氣道之藥不使熱毒侵犯自能免此患矣加味甘桔湯牛蒡子炒苦桔梗生甘草射干水煎服方歌加味甘桔湯最良痘證嗆水效非常牛蒡子合苦桔梗甘草射干共煎嘗加味解毒湯元參苦桔梗麥門冬去心當歸尾赤芍生地黃連翹去心牛蒡子炒研丹皮紅花甘草生木通引用燈心水煎服方歌加味解毒湯最靈元參桔梗麥門冬歸芍生地翹牛蒡丹皮紅花草木通口噴穢氣發痘脾胃被毒侵口噴穢氣不堪聞毒火燔灼宜速治加味歸宗功效神注毒火侵炙脾胃故口出臭味令人難近蓋出痘全賴脾胃以為根本今為毒火侵害則根本受傷不急救之必至脾胃潰爛而成大害須以歸宗湯治之穢減庶可望生歸宗湯方見發熱證治不食便秘不食解毒湯脾虛不食參朮良不食咽腫甘桔劑傷食惡食平胃嘗注痘瘡賴氣血以成功氣血藉飲食以生化自起脹灌漿以至收靨結痂俱以胃壯為根本故痘中遇不食之證須要明辨如大便秘結痘瘡焮紫不食此毒盛血熱也宜涼血解毒湯加黃芩黃連大黃主之若痘色灰白泄瀉不食此脾氣虛弱也人參白朮散主之行漿時欲食而復畏食此咽門腫痛難以下咽也宜加味甘桔湯主之設喜食過多惡食不食乃內傷飲食胃有宿滯也宜加味平胃散主之涼血解毒湯方見結痂落痂證治人參白朮散方見喘證加味甘桔湯方見嗆水加味平胃散方見腹痛汗熱少汗微營衛暢太過須防陰液亡自汗不止保元劑盜汗夜熱六黃湯注衛氣乃護衛皮膚固守津液使不走泄者也痘證見此是痘毒之火由里達表干於衛氣腠理疏故汗出矣初見有微汗者是榮衛通暢毒從汗解實良候也但汗為血液太過則陰液必亡須緊防之如起脹後大汗不止未行漿恐不能灌既行漿恐不能靨既靨尤恐氣血虛脫最為可畏自汗為陽虛急於斂汗以保元湯主之盜汗為陰虛急於降火以當歸六黃湯主之加味保元湯人參黃耆蜜炙浮小麥甘草炙廣桂枝白芍炒水煎服方歌陽虛汗出用保元人參黃耆浮麥甘廣桂枝同白芍藥斂汗實腠此為先當歸六黃湯黃芩黃柏黃連生地熟地當歸黃耆生水煎服方歌六黃湯斂陰虛汗黃芩黃柏共黃連生熟地黃當歸配黃耆倍用效通仙秘結痘瘡內外宜宣暢秘結氣血鮮流蕩大便不通四順宜小便秘澀八正當注凡出痘二便最喜通暢以痘屬毒火惟通暢然後經絡疏利氣血流動而無壅遏之患一有不通則毒火不能外達必至內攻而生患初出大便秘者四順清涼飲主之小便秘者八正散主之若至成漿時切勿輕用四順清涼飲白芍藥當歸身甘草生生大黃水煎服方歌四順清涼治秘結大便不通毒火烈白芍當歸大黃草急急煎服效最捷八正散車前子瞿麥萹蓄梔子仁大黃甘草生木通滑石引用燈心水煎服方歌八正散治小便秘車前瞿麥與萹蓄梔子大黃木通草更入滑石煎成劑瀉泄初熱作瀉柴苓先脾虛冷瀉木香煎色黃酸臭胃苓治灌漿虛滑豆蔻丸注痘證不喜秘結更忌瀉利初出時瀉尚具開通之功火熱由利而解若瀉甚則是邪氣並於腸胃迫而下降使傳化失常也宜柴苓湯主之起脹時瀉手足逆冷痘不起其色淡白此冷瀉也以陳氏木香散主之如中滿惡食瀉黃酸臭手足心熱面赤瘡紅此胃熱作瀉以胃苓湯主之惟成漿時尤為緊要蓋痘瘡至此津液已衰脾胃已弱復加泄瀉則百變叢生急以豆蔻丸主之柴苓湯黃芩半夏姜炙白朮土炒甘草生赤茯苓豬苓澤瀉柴胡引用生薑燈心水煎服方歌痘形未見先泄瀉柴苓疏利功最捷芩半術甘赤茯苓豬苓柴胡共澤瀉陳氏木香散方見厥逆胃苓湯陳皮厚朴姜炒赤茯苓蒼朮米泔水浸炒豬苓澤瀉白朮土炒引用燈心水煎服方歌裡實作瀉胃苓治陳皮厚朴赤茯苓蒼朮豬苓並澤瀉減桂倍術效無窮豆蔻丸白龍骨煅肉豆蔻麵裹煨去油木香煨砂仁訶黎勒肉麵裹煨各五錢赤石脂煅七錢半白枯礬三錢共為細末麵糊為丸如黍米大每服三五十丸米飲下痢疾痘瘡未愈痢隨生濕熱傷中證非輕白屬傷氣四君劑紅屬傷血四物靈注凡痘瘡未愈而患痢疾者乃濕熱鬱於腸胃致傷氣血而然也痘必滯黯無色治當清熱除濕調理氣血為主白痢屬氣加味四君子湯主之赤痢屬血加味四物湯主之赤白相兼者合而用之加味四君子湯茯苓白朮土炒人參陳皮木香煨甘草炙黃連姜炙黃芩水煎服方歌加味四君妙如神茯苓白朮共人參陳皮木香炙甘草姜炒川連配黃芩加味四物湯川芎當歸生地黃芩酒炒川連酒炒木香白芍炒水煎服方歌加味四物治赤痢川芎當歸共生地酒炒黃芩合川連木香白芍調成劑癢見點作癢葛根湯灌漿癢塌大補良觸犯暴癢熏避穢急煎內托免毒藏注經曰諸癢為虛又曰火微則癢治者須分別治之痘方出而身癢者此邪氣欲出腠理嚴密其火遊溢往來故不時作癢加味升麻葛根湯主之灌漿時痘色淡白平塌便溏懶食漿清作癢者此脾胃弱氣血虛也十全大補湯主之如穢氣觸犯而暴癢者外用避穢香薰之內服內托散送毒外出庶無內攻之患至於將斂而作癢者此膿成毒化榮衛和暢也與瘡癤將痊作癢者同論不必服藥加味升麻葛根湯升麻葛根防風淡豆豉赤芍桂枝甘草生水煎服方歌加味升麻葛根湯痘出作癢最堪嘗升葛防風淡豆豉赤芍桂枝甘草良十全大補湯方見結痂落痂證治避穢香蒼朮大黃茵陳等分上銼細棗肉為餅爐中燒之能避邪穢內托散黃耆蜜炙人參川芎當歸白芷木香煨桔梗厚朴姜炒甘草炙肉桂防風引用薑棗水煎服方歌內托散防毒內攻黃耆人參與川芎當歸白芷木香桔厚朴甘草桂防風痛小兒出痘若疼痛皆因毒火未發清疏散清解是妙方葛根四物湯極應注經曰諸痛為實又曰熱盛則痛皆緣痘毒之火未能盡解故不時作痛也痘初出痛者因毒未發透也升麻葛根湯主之痘出稠密而作痛者毒盛血熱也加味四物湯主之若收靨時痛甚悶亂者不治升麻葛根湯方見發熱證治加味四物湯當歸赤芍荊芥穗防風紅花丹皮牛蒡子炒連翹去心川芎生地黃水煎服方歌毒盛加味四物湯當歸赤芍合荊防紅花丹皮牛蒡子連翹川芎生地黃失音痘之始終喜音清毒熱壅塞啞無聲喉中有痘不須治若是毒攻甘桔寧注音者心之聲也心氣上達於肺而作音肺清則音清肺熱則音啞如痘當灌漿而音啞者此喉中有痘礙於氣道待外痘收靨則內痘自清不必施治若未長灌而音已先啞者此熱毒壅遏肺竅而然也宜加味甘桔湯治之加味甘桔湯射干牛蒡子炒元參連翹去心麥門冬去心梔子炒苦桔梗甘草生水煎服方歌加味甘桔治失音射干牛蒡與元參連翹麥冬炒梔子桔梗甘草共和勻衄血便血熱盛衄血犀角湯脾不統血參術良熱注腸胃四物治脾虛便血歸脾嘗注血屬陰諸經賴以養育痘瘡資以成功一為毒火熏灼則血隨火動迫而妄行上則為衄血下則為便血痘色紫滯燥熱口渴而衄者此毒火刑金也犀角地黃湯主之靨後餘毒乘脾而衄者此脾虛不能統血歸經也人參白朮散主之外俱用發灰散吹入鼻中若毒火熾甚流注大腸大便下血加味四物湯主之設痘色灰白陷下而便血者此脾氣虛弱不能攝血宜歸脾湯主之至若大吐血尿血及七竅出血變在反掌不必服藥犀角地黃湯犀角鎊丹皮生地白芍水煎服方歌毒火上衝頻衄血犀角地黃湯效捷犀角鎊與牡丹皮生地白芍共煎列人參白朮散方見喘證發灰散用少壯無病人之亂髮以皂角煮水洗淨油氣焙乾用新瓦罐一個填入內令滿淨瓦片蓋口鹽泥封之炭火圍罐之半煅一炷香取出候冷研細吹鼻中或用發灰二分童便七分酒三分調服亦可止血加味四物湯當歸白芍酒炒生地牡丹皮荊芥炒黑川芎黃芩黃連地榆水煎服方歌加味四物便血宜歸芍生地牡丹皮荊芥炒黑川芎配黃芩黃連共地榆歸脾湯人參白朮土炒甘草炙黃耆蜜炙棗仁炒研遠志去心龍眼肉茯神當歸木香煨引用薑棗水煎服方歌歸脾湯治脾氣虛人參白朮草黃耆棗仁遠志龍眼肉茯神當歸木香宜寒戰咬牙寒戰咬牙要分明初熱在表羌活從肺胃有熱四物劑氣血兩虛參歸靈注寒戰咬牙者森森若寒振振搖動上下牙尖相磨而鳴也初熱時寒戰咬牙者因火毒留於經絡之中邪正相爭欲出不出所致也治宜清熱透表以羌活湯主之如見點後痘色紫赤大便秘小便澀煩躁口渴者此屬實熱是胃熱則咬牙肺熱則寒戰也宜加味四物湯主之若灌漿時膿色清稀大便溏小便長身涼不渴者此屬氣血兩虛是氣虛則寒戰血虛則咬牙宜參歸鹿茸湯主之羌活湯龍膽草薄荷防風當歸梔子淡竹葉羌活甘草生川芎引用生薑水煎服方歌羌活湯除風熱攻龍膽薄荷共防風當歸梔子淡竹葉羌活甘草及川芎加味四物湯生地連翹去心川芎當歸赤芍石膏煅麥門冬去心川黃連姜炒木通水煎服方歌加味四物治熱盛寒戰咬牙二怔並生地連翹芎芍歸石膏麥連木通共參歸鹿茸湯方見灌漿證治倦怠倦怠多因氣虛弱或緣滯熱困兒脾虛而無熱補中治食滯傷脾保元醫注痘中倦怠固屬中氣不足服補中益氣湯最為妥協然亦有神氣本弱或為食熱所困其現證雖與不足等但不可專以虛治當於補劑中佐以清熱之品如保元加味用之可也補中益氣湯方見痘頂塌陷加味保元湯人參黃耆生甘草炙梔子炒黃芩酒炒麥門冬去心山楂神麯炒陳皮麥芽炒引用生薑大棗水煎服方歌加味保元食熱虛參耆甘草補厥脾梔芩麥冬清心熱楂曲陳麥消滯宜痘後浮腫表虛風邪乘間入遍身面目虛腫浮五皮桂枝微汗後面消身腫胃苓除注小兒痘後表氣虛弱見風太早風邪乘虛而入致使面目虛浮遍身皆腫者初宜五皮湯微汗之服後面目不浮惟遍身猶腫者胃苓湯主之五皮湯地骨皮五加皮桑皮蜜炙桂枝姜皮大腹皮洗引用燈心水煎服方歌痘後浮腫五皮湯地骨五加蜜炙桑桂枝姜皮合大腹引用燈心水煎嘗胃苓湯方見瀉證
