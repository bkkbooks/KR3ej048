body:
  text: 卷一痘原上古無痘性淳朴中古有痘情欲恣痘稟胎元出不再毒之深淺重輕識天瘡之名因天稟瘡形如豆痘名居塞北不出寒勝熱毒發必自待天時注上古之人無出痘者天性淳朴也中古之人有出痘者情欲漸熾也古人謂痘稟胎毒此定論也惟稟於胎元故一出不再出也毒有淺深故出有輕重也名為天瘡者因毒稟於先天也名為痘瘡音因瘡形如豆也其毒伏於形中而塞北不出者以其氣多寒涼鮮邪陽火旺之氣以觸發其毒故伏藏於內而不出也中土之人必出者以其氣多溫熱一觸邪陽火旺之氣毒隨內發而即出也此皆醫所當識者也出痘形證欲識小兒出痘形類是傷寒發熱驚氣粗眼目中指冷耳尻不熱耳筋紅注痘證初起見證大抵與傷寒相似其候身體發熱不時驚悸口鼻氣粗兩眼䀽發䀽惟中指獨冷耳尻不熱耳後有紅筋皆為出痘之形證也痘出五臟形證痘出五臟主證形呵缺頓悶是肝經肺證咳嗽痰嚏涕心證驚煩面赤紅脾證喜睡肢熱利耳尻俱涼是腎徵肝泡肺膿心赤小脾大黃淺腎黑形注痘瘡之毒伏於五臟故內出何臟外即應之如呵缺頓悶此痘出肝經證也咳嗽有痰噴嚏泣涕此痘出肺經證也驚悸煩躁面色紅赤此痘出心經證也喜睡自利四肢發熱此痘出脾經證也惟腎經但見尻耳發涼者是火不能勝水也肝痘之形為水泡其色青而小肺痘之形為膿泡其色白而大心痘之形其色赤而小脾痘之形其色黃淺而大至於腎經不宜有證若水不勝火痘色黑者非吉兆也痘主部位額心頦腎鼻脾部左頰肝位右肺方周身分主面屬胃頭背膀胱腰腎疆心肺胸膈肝膽脅腹肢屬脾大小腸包絡之絡聯臟腑三焦之氣應無方注小兒出痘自頭面以及周身各有臟腑所屬部位治者須詳察部位以定吉凶如額先見點者是毒發於心也頦先見點者毒發於腎也左頰先見點者毒發於肝也右頰先見點者毒發於肺也鼻先見點者毒發於脾也面屬胃經部位也頭背屬膀胱經部位也腰屬腎經部位也胸膈屬心肺二經部位也脅旁屬肝膽二經部位也肚腹四肢屬脾大小腸三經部位也至於包絡乃周身脂膜之絡聯屬百骸臟腑者也三焦為周身水精之氣充滿軀殼臟腑者也凡周身發痘俱從此出故無一定部位也痘形順逆痘形見點喜尖圓惡隱蚊跡痱粟蠶起脹漸綻充肥順頂平不突板實難生漿斂束形完固軟嫩皮薄癢塌纏結痂如螺先後落最忌麩薄潰爛黏注痘形氣之為也氣勝毒則毒為氣馭其毒解矣故順也毒勝氣則氣為毒蝕其氣竭矣故逆也氣毒相平則勢界於險惟在醫者調治得宜使險變順也如始出之形頂尖而根圓此氣勝毒為順也若隱如蚊咬或如熱痱寒粟蠶種此毒勝氣為逆也起脹之形漸綻充肥此氣勝毒為順也若頂平不突板實不綻此毒勝氣為逆也成漿之形根紅斂束痘殼完固此氣勝毒為順也若殼軟皮薄則必癢塌此毒勝氣為逆也結痂之形痂如螺殼先結先落後結後落此氣勝毒為順也若痂薄如麩潰爛黏聚此毒勝氣為逆也此痘形順逆之大略也痘色順逆痘色桃花漸漸紅淡白枯紫晦多凶起脹頂白根紅潤頂灰根散或深紅生漿由白而黃厚最忌灰干與薄清靨喜蒼栗惡麩白疤喜紅滿惡白平注痘色血之為也血勝毒則毒為血載其毒化矣故順也毒勝血則血為毒滯其血涸矣故逆也血毒相平則勢界於險亦在醫者之調治得宜也始出之色如桃花而漸加滋潤此血勝毒為順也若初出即淡白乾紫晦而不亮此毒勝血為逆也起脹之色頂漸放白根紅光潤此血勝毒為順也若頂色灰滯根血散漫或地腳深紅此毒勝血為逆也生漿之色白而漸黃蒼而淳厚此血勝毒為順也若灰幹不潤或漿薄清稀此毒勝血為逆也結痂之色蒼如栗殼此血勝毒為順也若痂色麩白此毒勝血為逆也疤痕之色紅潤凸起為順若淡白黑紫平凹無突起之狀皆為不順之色醫者詳之痘證老嫩蒼淳嬌豔老嫩色厚實浮虛老嫩形濃濁稀清漿老嫩厚薄痂之老嫩明注痘之一證自始至終喜老惡嫩如蒼淳嬌豔此色之老嫩也肥實浮虛此形之老嫩也濃濁稀清此漿之老嫩也薄軟厚堅此痂之老嫩也總之老者多順易於成功嫩多險逆難於施治也痘證疏密頭項胸背痘疏吉手足雖密不為凶疏兼陽熱須防變密若磊落不必驚注頭面清陽元首頸項管籥咽喉胸背乃臟腑所附惟稀疏則吉也至於手足無甚關係雖多不為凶也疏固是順若見陽證譫妄大渴大熱唇舌燥裂煩躁不寧大小便祕等證此毒壅遏不出雖疏未為吉也密固是逆若鋪排磊落大小勻淨精神寢食二便如常雖密亦不須驚也辨形神聲氣飲食之虛實軀之肥瘦形衰盛聲之粗細氣虛實目了不了神強弱胃氣虛實食不食注欲治痘者先看兒體之肥瘦體肥者形盛可知也體瘦者形衰可知也次聽聲氣之粗細聲粗者聲音雄粗此氣實也聲細者聲音微細此氣虛也再觀其目中之神了了精彩者此神強也目不了不精彩者此神弱也更問其飲食能否飲食如常者胃氣實也不能飲食者胃氣虛也此辨形神聲氣飲食之虛實也辨氣血虛實證氣虛頂陷多軟薄氣過成泡少漿膿血虛淡紅摸轉白血過發癍紫黑凝注痘之形色乃氣血外現也如頂凹陷手摸之多軟薄者此氣虛也氣過者氣過盛也泡者發水泡也少漿膿者不能生漿也謂氣若過盛則發水泡而漿不能生也如痘色淡紅以手摸過隨即轉白者此血虛也血過者血過盛也癍者地界有癍暈也紫黑凝者謂毒盛則色紫黑凝滯也此就痘癍形色以辨氣血之虛實也辨表證虛實發熱惡寒身痛表有汗為虛無汗實實隱稠密灰紅滯虛平塌爛水浸濕注痘出有發熱惡寒身體疼痛者屬表證也若有汗則為表虛無汗則為表實表實閉塞痘毒隱伏難出也稠密者痘出稠密也灰者痘色灰白也紅者痘色紅赤也滯者謂痘稠密不論灰紅若帶滯暗者皆表毒盛也若表虛之證則痘平不起塌癢無漿也爛者痘潰爛也水浸濕者痘膿水浸漬濕而不幹也此辨表證之虛實也辨里證虛實發熱惡熱硬痛里便祕為實下利虛實則板實根緊硬虛則倒陷靨收遲注痘出發熱惡寒者表證也不惡寒惡熱者里證也硬者不大便而硬也痛者肚腹作痛也此皆屬裡熱之證若便祕則為裡實下利則為裡虛板實者痘囊板實不活動也根緊硬者根腳緊束堅硬不松皆裡實證也倒陷者痘已出復陷入於內也倒靨者痘正灌漿即收靨也收遲者痘已灌漿日久不靨皆裡虛證也此辨里之虛實也辨陽熱證陽熱壯熱面唇赤舌乾飲冷爪尿紅煩躁昏狂譫失血紫黑焦枯不潤通注凡痘屬陽熱者身必壯熱面唇皆赤舌上乾燥好飲冷水爪甲尿尿皆現紅色煩躁不寧神氣昏憒發狂譫語失血者吐血衄血也紫黑焦枯者痘色紫黑焦枯也不潤通者九竅不潤通也此皆屬陽熱之證也辨陰寒證陰寒無熱口鼻冷面唇尿爪色白青厥冷難回利不臭水泡灰白無暈紅注凡痘屬陰寒者身肢不熱口鼻皆冷面唇尿尿爪甲色現青白也厥冷難回者謂四肢厥冷不能即溫也利不臭者謂下利無臭穢也水泡濕盛也灰白無暈者謂痘色灰白根腳無紅暈也此皆屬陰寒之證也辨虛實寒熱誤治溫補過則痘潰爛毒攻咽齦目腫癰清瀉過則痘白陷嘔吐不渴厥利清注痘有虛實治有補瀉要在審當而施也如虛者當補亦須酌量施治若溫補過甚則反助毒熱而痘潰爛也以致毒熱上攻或咽喉腫痛或牙齦發疳或眼目赤腫生翳甚而攻於榮衛發為癰疽也如實者當瀉亦須中病即止若清瀉過甚則損傷正氣而痘白陷或嘔吐不渴或厥逆下利此皆發明溫補清瀉之過當也稟賦順逆險毒微氣血實則順毒甚而虛逆自明毒微若虛恐化險毒甚逢實變險能注痘由稟賦毒氣輕者固順然必兒之氣血不虛則始為順也重者固逆亦必兒之氣血虛則始為逆也毒微者順也若兒之氣血虛弱雖順恐化險也毒甚者逆也若兒之氣血不虛雖逆能變險也此以兒之胎毒重輕氣血虛實定痘之順逆險也天時順逆險毒微天時和者吉毒甚天時不和凶毒微不和順中險毒甚時和逆或更注毒微吉矣然必逢大時之和始為順而吉也毒甚凶矣然必遇大時不和則始為逆而凶也毒微者順也若值天時不和恐順中化險也毒甚者逆也若值天時之和或逆中轉險也此以胎毒之輕重天時之和不和定痘之順逆險也人事順逆險險逆時和無病吉不和有病定然凶由此故識種痘善人事能回天命亨注凡痘險逆之證固不善矣若逢天時之和兒又無病險者可以變順逆者可以化險故曰吉也若逢天時不和兒又有病則險者變逆逆者更逆故曰凶也由此觀之可識種痘之善以得其天時之和兒素無病其中即有毒之重者而人事克盡亦能挽回天命而致亨也發熱順證發熱和緩微微汗飲食如常二便調睡臥安然神氣爽此為順證不須療注發熱和緩身不甚熱毒輕也微微汗身微微有汗表和也飲食二便如常里和也神氣清爽睡臥安然精神氣血大和故為順證不須治療也發熱險證發熱三日熱不退煩渴咬牙面赤紅驚啼戰栗乳食少夜不安眠險證明注發熱三日見點者常候也若見點熱不退者毒盛也更兼煩躁口渴頻頻咬牙面色紅赤驚悸多啼身體戰栗乳食甚少不能安眠等證此是毒盛伏郁難出其為險證明矣急宜隨證施治庶或從險化順也發熱逆證發熱神昏悶亂成妄言喘滿腹腰疼不食不眠搐不止乾嘔失血證逆凶注發熱神昏悶亂妄言毒伏於心也喘滿喘急毒伏於肺也腹疼毒伏於脾也腰疼毒伏於腎也不食不眠毒伏於胃也驚搐不止毒伏於肝也不時乾嘔失血吐血尿血是毒攻氣血內亂也此皆為不治之逆證勢多凶也發熱證治痘出發熱固自內必固其誘使之然時氣風寒驚食熱表裡虛實隨證參表熱惡寒而無汗裡熱有汗溲便難氣弱熱微不足治形實熱盛有餘看注痘出發熱者謂痘本火毒故未出先發熱也自內謂其熱自內達外也必因其誘使之然者謂必因其四時不正風寒邪氣使之發熱也驚謂外觸異物跌撲驚嚇使之發熱也食謂內傷食滯使之發熱也熱謂內熱積久因而熱發於外也內外既有所因之邪又當以表裡虛實隨證參詳治也表熱者謂發熱在表則惡寒而無汗也裡熱者謂發熱在裡則有汗小便短澀大便燥難也氣弱熱微者謂形氣不足發熱微輕也形實熱盛者謂形氣不余發熱太甚也醫者果能臨時詳察因證施治則汗下清補之法自得其宜矣升麻葛根湯發熱升麻葛根湯表邪痘疹兩得方升麻葛根赤芍草隨證宜加法最良無汗表實加麻薄便祕腹痛里大黃形怯氣弱參耆入熱盛犀連荊蒡防尿澀通滑車前子驚搐荊防鉤連羊煩渴石膏麥冬粉咳嗽前桔杏蘇桑傷食腹熱楂芽積下利芩連嘔半姜咽痛蒡梗身羌獨頭痛荊穗芎芷羌注痘出發熱當以升麻葛根湯為主以其能發表邪透痘疹兩得之良方也然必隨證加佐使之品斯為盡善如身熱無汗者此表實也本方中加麻黃薄荷如大小便祕腹作痛者此裡實也本方中加大黃如形氣怯弱者稟賦不足也本方中加人參黃耆熱盛者內熱熾盛也本方中加犀角黃連荊芥牛蒡子防風如小便短澀者熱結膀胱也本方中加木通滑石車前子如發驚搐者肝心有熱也本方中加荊芥防風鉤藤鉤川黃連羚羊角如煩渴者內熱盛也本方中加石膏麥冬花粉如咳嗽喘急者肺郁風邪也本方中加前胡桔梗杏仁蘇葉桑皮如傷食腹皮熱者胃中停滯也本方中加山楂麥芽枳殼如下利者腸胃熱滯也本方中加黃連黃芩如作嘔者胸膈有痰飲也本方中加半夏生薑如咽痛者火在上焦也本方中加牛蒡子苦桔梗如遍身痠疼者外染風寒也本方中加羌活獨活如頭痛者上冒風寒也本方中加荊芥穗川芎白芷羌活此治發熱之大略又貴臨時詳察融會貫通也升麻葛根湯升麻葛根赤芍藥生甘草引加芫荽水煎服歸宗湯形實無表毒火盛所以歸宗主大黃地芍楂青通荊蒡壯熱爪紫肢厥涼惡熱頭汗蒸蒸汗便祕譫語煩躁狂大渴唇焦舌生刺失血腰痛不循常注發熱之初形實者形氣壯實也無表者無風寒表邪也若證見毒火太盛法當攻之所以用歸宗湯者因其以大黃為主也而佐使生地赤芍山楂青皮木通荊芥穗牛蒡子也痘未見點如壯熱不已毒火熾盛也爪甲色紫血熱凝滯也四肢厥冷同陽證見者熱深厥深也惡熱內熱盛也頭汗出胃熱上蒸也通身蒸蒸汗毒火內迫津液也大小便閉腸胃熱結也譫語胃熱也煩躁狂亂毒火擾心神也大渴引飲毒火灼津液也唇口焦烈舌生芒刺毒火胃熱並盛也失血者口中失血小便尿血也皆緣火毒迫血妄行也其腰痛不尋常者毒攻腎位也已上諸證非險則逆若見之急用此方峻攻火毒庶可挽回少有逡巡瞻顧則無及矣歸宗湯大黃生地黃赤芍藥東山楂青皮木通荊芥穗牛蒡子炒引加燈心水煎服清解散痘驚清解升葛蒡荊防甘草桔連芩蟬翹芎前楂通紫表羌蘇芷弱耆參注痘欲出而發驚搐者皆由其毒不得快然宣發而鬱於經也其現證則面赤心煩口渴手足抽搐俱以清解散主之或因風寒束於表者其現證則無汗頭疼身體疼痛咳嗽噴涕本方中加羌活蘇葉白芷以表發之若兼形氣虛弱者其現證則面色淺淡身體微熱四肢微溫倦怠嗜臥本方中加人參黃耆以托之清解散防風荊芥牛蒡子炒生甘草升麻葛根桔梗黃連黃芩蟬蛻紫草茸川芎前胡南山楂木通連翹去心引加生薑燈心水煎服寬中透毒飲傷食寬中透毒飲葛桔前青朴枳楂麥蟬翹蒡連荊草便祕大黃木通加注痘欲出發熱有現證嘔吐煩渴大便酸臭此兼傷食也以寬中透毒飲主之若更大便祕小便赤澀腹熱悶通者此兼滯熱也本方中加大黃木通通利之寬中透毒飲葛根桔梗前胡青皮厚朴姜炒枳殼麩炒南山楂麥芽炒蟬蛻連翹去心牛蒡子炒研黃連荊芥穗甘草炒引加生薑燈心水煎服見點順證發熱三朝始見點熱減身和不渴煩顆粒稀疏漸次出色潤紅活頂尖圓注發熱三朝之後始見點者此痘如期而出也熱減身和者毒已宣發透徹也不渴不煩者無裡熱壅滯也顆粒稀疏者不稠密連絡也漸次出者先自頭面漸至周身而出也色潤紅者痘色紅活滋潤也頂尖圓者痘形頂尖而體圓也此皆見點順證見點險證痘已見形身仍熱稠密連絡不潤紅稀疏淡隱精神少痘順兼雜病險名注痘已見形身仍發熱者此毒氣未盡透也稠密者痘出稠密不少也連絡者顆粒黏連不分也不潤紅者痘色雖紅而黯滯也稀疏淡隱者痘雖稀疏而色淺淡隱於皮膚不透出也精神少者精神倦怠也此皆見點險證痘順兼雜病者謂痘出雖屬順證而或兼雜病亦屬險名也見點逆證發熱一朝即見形一齊湧出不分明密如蠶種平塌隱紫黑乾枯逆證凶注發熱一朝或半朝即見點者此毒火太迅不循次第也一齊湧出者此毒火太盛不受領載也點不分明者顆粒不分也密如蠶種者密如蠶之種也平塌者平塌不起也隱者痘已出復隱也紫黑者痘色或紫或黑也乾枯者痘乾枯不潤也此皆見點逆證見點證治發熱三朝漸見點熱減形疏色潤紅應出不出出猶熱已出復隱湧出凶赤紫黑白分亮黯平板稠連辨緊松當審風寒毒火制氣血虛失領載能注發熱三朝漸漸見點者謂見點不疾不徐也熱減者謂痘出齊而熱減退也形疏者謂痘稀疏顆粒分明也色潤紅者謂色紅而潤澤也皆見點順痘也應出不出者謂發熱三日之後而不見點此毒伏於內也出猶熱者謂痘已出齊而猶身熱不退此毒熱盛也已出復隱者謂痘已見點復隱藏不見此毒陷內攻也湧出者謂發熱不待三日其痘一齊湧出此毒火迅烈也此皆逆而主凶之痘也赤紫黑白者謂痘色紅為正或深紅赤色深赤紫色紫甚黑色不紅白色皆非正色也分亮黯者謂非正色之痘又當分亮黯而取治焉亮者多虛黯者多實赤紫黑色明亮者尚有活動可治之機若滯黯則為毒熱凝滯不行也色白亮者乃氣血因虛不榮也白而黯者謂氣血為毒所制也平板稠連者謂痘形平塌不起板硬不綻或稠密成攢連絡不分皆非正形也辨緊松者謂非正形之痘當辨緊松而取治焉緊松者根腳之緊松也緊者毒滯松者毒松平板稠連根形松綻尚有活動可治之機若根形緊束則為毒盛瘀滯難治之痘也當審風寒毒火制者謂已上痘之形色各有所因當審其為風寒外郁火毒內錮也氣血虛失領載能者謂或因氣虛不能領毒血虛不能載毒使毒不能發於肌表而失領載之能也蘇解散歸宗湯保元湯升麻葛根湯應出不出表蘇解羌蘇升葛桔荊防川芎前薄楂通草裡熱毒伏歸宗湯不足不出無表裡參耆甘草保元湯毒輕升麻葛根並毒重攻毒救正良注痘發熱三朝期應見點而不見點則為應出不出若有表邪風寒外郁不出宜用蘇解散發之表開自然出也若無表證而有裡熱者此為毒火內伏不出宜用歸宗湯攻之里開自然出也若形氣不足應出不出無表裡證者是正氣虛而不能發出也若毒輕熱微宜用保元湯合升麻葛根湯並而用之補正除邪可也若有表裡證或毒重熱甚則不宜補恐助火毒宜蘇解散或歸宗湯攻邪救正為良法也蘇解散川芎前胡牛蒡子炒南山楂木通生甘草羌活蘇葉升麻葛根桔梗荊芥防風引加芫荽水煎服保宗湯方見發熱證治保元湯人參黃耆制甘草炙引加生薑水煎服升麻葛根湯方見發熱證治涼血攻毒飲清熱解毒湯已出猶熱分表裡在內涼血攻毒佳紅花紫草丹蟬葛合上歸宗減去楂在外清熱解毒治歸宗大赤不須加更入前連丹蟬蛻紫花地丁滑紅花注痘已見形身熱當減若仍熱不退此屬毒火盛也須分表裡施治若見在內毒火盛之證宜用涼血攻毒飲攻之其方即紅花紫草丹皮蟬蛻葛根合上歸宗湯藥減去山楂也若見在外毒火盛之證宜用清熱解毒湯解之其方即歸宗湯減去大黃赤芍更加前胡黃連丹皮蟬蛻紫花地丁滑石紅花是也涼血攻毒飲大黃荊芥穗木通牛蒡子炒赤芍生地青皮蟬蛻紅花紫草葛根丹皮引加燈心水煎服清熱解毒湯荊芥穗木通牛蒡子炒生地青皮山楂丹皮紅花蟬蛻前胡紫花地丁黃連滑石引加燈心水煎服蘇解散必勝湯保元湯千金內托散已出復隱謂之陷外邪閉塞蘇解良內毒必勝桃紅葛丁蟬地龍歸宗湯氣虛陷入保元主無熱千金內托方保元加桂歸芎芍白芷楂朴木香防注痘已見點復隱藏不見者謂之毒氣內陷也外邪閉塞者有外感風寒邪證閉塞其毒故以蘇解散解之也內毒者火毒內攻故以必勝湯攻之也其方即桃仁紅花葛根紫花地丁蟬蛻地龍合上歸宗湯也若形氣不足中氣不能載毒而復陷入者宜以保元湯主之也若不見熱證者虛而兼寒宜用千金內托散補而溫之其方即保元湯加官桂當歸川芎白芍白芷山楂木香防風也蘇解散方見本條證治必勝湯大黃荊芥穗赤芍青皮生地黃山楂木通牛蒡子炒桃仁紫花地丁蟬蛻葛根地龍紅花蘆根水煎藥服保元湯方見本條證治千金內托散人參黃耆制甘草炙官桂當歸白芍藥炒川芎白芷南山楂厚朴姜炒木香防風引加生薑水煎服南金散必勝湯見點外觸諸邪穢痘陷灰滯黑焦塌輕虛南金蠶荷葉重實必勝最為佳注痘至見點之後房中最要潔淨一被邪穢所觸則毒即陷於內矣灰滯者謂痘色灰白暗滯也黑者謂痘色紫黑也焦者謂痘形枯焦也塌者謂痘形平塌也輕虛者謂毒輕形氣虛也以南金散主之重實者謂毒重形氣實也以必勝湯主之南金散白殭蠶取直者炒紫背荷葉取霜後搭水者各等分共為末每服五分或一錢芫荽汁和黃酒少許調下必勝湯方見本條證治加味歸宗湯熱未三朝齊湧出毒火內發迅難當歸宗湯內加紫草石膏犀連歸尾良注熱未三朝者發熱或半日或一日也湧出者痘湧出不循序也此由毒火迅烈莫能約束以歸宗湯加紫草石膏犀角黃連歸尾治之歸宗湯方見發熱證治清熱解毒湯涼血攻毒飲千金內托散歸宗湯赤紫明澤解毒治黑暗焦枯攻毒良灰白亮虛內托散灰白滯郁歸宗湯注凡痘見點貴察其色如赤紫明亮者此毒盛血熱也以清熱解毒湯主之如黑暗乾枯者此毒錮血凝也以涼血攻毒飲主之如灰白明亮者此血氣虛而不榮也以千金內托散主之如灰白暗滯者此毒氣鬱滯而不行也以歸宗湯主之清熱解毒湯涼血攻毒飲千金內托散方俱見本條證治歸宗湯方見發熱證治紫草飲子歸宗湯平塌板硬根鬆散氣虛紫草飲木通紫甲楂蟬參枳殼根腳緊束主歸宗注凡痘見點貴觀其形若頂平不起根腳鬆散此氣虛不能載毒而痘難宣發也以紫草飲主之若根腳緊束此毒盛氣滯而內伏也以歸宗湯主之紫草飲子紫草蟬蛻人參穿山甲炒枳殼麩炒山楂木通水煎服歸宗湯方見發熱證治歸宗湯痘出稠密或黏連總是梟毒不必言惟以歸宗攻毒主根松猶可緊硬難注痘出之形貴審疏密若稠密攢簇黏連不分總屬梟毒為害惟以歸宗湯攻毒為主其痘根腳鬆動者猶屬可治若緊束板硬者難治歸宗湯方見發熱證治起脹順證三朝出齊漸次長尖圓礙指腳紅活頂漸放白肥潤滿順證飲食二便和注三朝出齊者謂見點三朝俱出齊也漸次長者謂痘形漸次長也尖圓礙指者謂痘形尖圓摸之礙指也腳紅活者謂痘根腳紅活也頂漸放白者痘頂漸漸放白光瑩也肥者謂痘形肥實也潤者謂痘色潤澤也滿者謂痘體充滿也順證飲食二便和者謂飲食二便如常調和也起脹險證起脹頂陷灰或紫稠密嬌紅不綻蒼形色雖順夾雜險證險神清胃壯康注起脹頂陷者謂痘頂凹陷也灰者謂痘色灰白也紫者痘色赤紫也稠密者痘色稠密成攢也嬌紅者謂痘色紅而嬌嫩也不綻蒼者謂痘形不舒綻色不蒼老也此皆起脹險證也又有形色雖順而夾雜病者雖順恐變為險也若痘之形色雖險而神氣清爽飲食強美雖險將化為順也此順中險險中順不可不詳辨之起脹逆證起脹肉腫痘不腫根血散亂頂平塌紫黯乾枯灰自滯名為逆證勢多差注起脹肉腫痘不腫者謂或頭面或周身浮腫如瓠瓜之狀而痘反不腫脹此氣血不能拘攝毒氣致毒散漫也根血散亂者謂根腳血色散亂此毒迫血不歸附於痘也頂平塌者謂痘頂不起發也此毒火錮於氣分不能充發也紫黯者痘色紫黯不明此毒熾血凝也乾枯者枯不潤澤此血為毒火燔灼也灰白滯者謂痘色灰白黯滯此毒火太甚氣血鬱滯也此皆起脹逆證勢多難救起脹證治痘當起脹漸尖圓紅潤根松體厚堅平凹嫩白為虛證赤紫板塌是毒殘更有風寒滯熱鬱毒不透達起發難察痘形色分所屬合證虛實寒熱參注痘出齊之後當漸漸依次起脹其形頂尖肥圓其色紅活滋潤根腳松綻體厚皮堅皆起脹順痘也平者謂平扁不脹凹者謂頂陷不起嫩者謂皮薄嬌嫩白者謂色白不紅此皆為氣血虛弱赤者深紅而豔紫者深赤而黯板者板硬不綻塌者平塌不起此皆毒熱傷殘更有風寒外束滯熱內郁使毒不得透出而起發也醫者當察痘之形色分其所屬合其病證虛實寒熱參詳施治庶無差謬矣保元化毒湯平凹灰白皮嫩亮倦怠氣乏不渴煩保元化毒參耆草芎歸植甲芷香蠶注痘不如期起脹若平扁頂凹其色灰白皮薄嫩亮更現倦怠氣乏不渴不煩等虛證者此氣血虛弱不能起發其毒也宜用保元化毒湯主之保元化毒湯人參黃耆蜜炙甘草炙當歸南山楂穿山甲炒白芷木香殭蠶炒研川芎引加煨姜水煎服必勝湯歸宗湯豔紅紫黯不起脹板硬平塌不綻松證見陽熱一切證急服必勝或歸宗注痘當起脹之時若色豔紅紫黯而不起脹板硬平塌而不綻松更見陽熱煩躁便閉悶亂等證者此毒火錮滯氣血不能領載其毒也急用必勝湯或歸宗湯庶或逆中求生也必勝湯方見見點證治歸宗湯方見發熱證治蘇解散外因風寒痘不起淺淡黯滯不潤紅發熱惡寒無汗表蘇解散發自然松注痘當起脹之時偶為風寒外襲閉塞痘毒不能起脹者其色則淺淡黯滯不潤其證則現發熱惡寒無汗宜用蘇解散透發其毒自然松而起矣蘇解散方見見點證治寬中快癍湯傷食滯熱鬱不起惡食腹熱便臭黏快癍透毒加陳木減葛蒡穗桔前蟬注起脹之時過於飲食滯熱內郁痘不起脹其現證懶食惡食肚皮發熱大便臭黏宜用寬中快癍湯主之其方即寬中透毒飲加入陳皮木香減去葛根牛蒡子荊芥穗桔梗前胡蟬蛻寬中快癍湯青皮醋炒陳皮枳殼炒南山楂麥芽炒木香黃連生連翹去心厚朴炒甘草生引用生薑燈心水煎服灌漿順證順證七朝漿自行先起先灌次第明由紅轉白漸肥澤九日蒼蠟顯痂形注灌漿順證者因氣盈血附其毒易化至七朝不期行而自行也先起先灌次第明者謂痘先起脹者當先灌漿自頭面以及周身也由紅轉白漸肥澤者謂痘先見紅點由紅轉白血變成漿漸漸肥滿而光澤也至九日漿老則蒼如黃蠟色而顯結痂之形矣灌漿險證灌漿漿清不按期行遲收早總非宜亮軟根豔並水泡不雜他證險可醫注痘當灌漿之時漿清不濃及不按期而漿行遲者皆氣血虛也漿行收早者是毒熱盛也軟薄者謂痘皮不能堅實恐其易於損破則氣泄而漿難成也根豔者謂痘根赤豔熱在血分毒未盡化也水泡者水泡夾雜於痘中蓋因脾虛多濕也此皆險證若不夾雜他證雖險亦可醫也灌漿逆證紫黑灰白漿不行癍爛癢塌痘殼空稠密無漿目不閉已閉行漿復開凶注痘至行漿之時其色紫黑或灰白而漿不行者非梟毒內蘊錮滯氣血即虛弱不能領載其毒也癍爛者謂漿未成而腐爛也癢塌者謂行漿時作癢塌也痘殼空者謂殼空而無漿也稠密無漿者謂稠密不分顆粒而復乾枯無漿也目不閉者謂痘出太稠密而眼目不封也目已閉復開凶者謂起脹時其目已閉行漿時目忽復開也此皆灌漿逆證必主凶也灌漿證治毒化漿行領載功膿窠充滿根暈紅板黃灰滯紫黯熱地紫形焦毒熱凝根暈淡紅血虧少頂陷灰白氣不盈皮薄漿清根無暈氣虛血縮甚分明注起脹既順而按日毒化漿行乃氣領血載之功也故發時膿窠充滿根暈紅活皆灌漿順痘也板黃者謂板硬幹黃乃毒盛凝結氣血也灰滯者謂灰白黯滯乃毒盛鬱滯氣血也紫黯者痘色紫黯乃毒盛血不化膿也地界色紫痘形焦黑乃毒火灼乾血液也根腳之暈紅色淺淡乃血不足而虧少也頂陷不起灰白無漿乃氣不足不充盈也若痘皮薄漿清根無紅暈乃氣血虛縮其用峻補無疑也清毒活血湯板灰紫黯漿不生清毒活血地歸茸楂芍翹蒡芩連桔木通參耆大酌行注痘不如期灌漿若板硬幹黃或灰滯紫黯乾枯此皆毒火傷其氣血而漿不行也俱以清毒活血湯為主其方即紫草茸當歸木通生地白芍連翹牛蒡子南山楂桔梗黃連黃芩人參黃耆是也本方中有人參黃耆形氣怯弱者宜之若形氣壯實者當減去人參黃耆便祕加大黃臨時當酌而行之可也清毒活血湯紫草茸當歸木通生地黃白芍酒炒連翹去心牛蒡子炒研南山楂桔梗黃連黃芩人參黃耆生引加燈心水煎服便祕者加大黃加味歸宗湯灌漿地紫形焦黑毒火熾盛氣血凝歸宗湯內加歸尾紅紫犀連山甲丁注痘當灌漿之時地界紅紫痘形焦黑而漿不行此毒火熾盛氣血錮滯也急用歸宗湯主之本方中加歸尾紅花紫草犀角黃連穿山甲地丁加味歸宗湯方見發熱證治千金內托散淡紅頂陷無漿膿氣血虛失領載功千金內托散堪服氣充毒化自漿生注痘灌漿時若色淡紅或頂凹陷又無膿漿者此氣血虛弱失其領載之功宜千金內托散補之氣充毒化而漿自生矣千金內托散方見見點證治參歸鹿茸湯皮薄漿清根無暈氣虛血縮變須臾參歸鹿茸湯峻補參歸鹿茸草黃耆注痘形皮薄漿清根色無紅暈者此氣虛血縮惟恐變在須臾也以參歸鹿茸湯峻補氣血漿生毒化庶得生矣參歸鹿茸湯人參鹿茸白酒炙歸身甘草炙嫩黃耆蜜炙引加糯米水煎服收靨順證十朝漿足應收靨先蠟後栗似螺形不疾不徐循次結痂潤身和順證明注十朝漿足者謂應收靨結痂之期然必先如蠟黃後如栗殼之色痂似旋螺高起則為上吉之痘不疾不徐者謂先蒼老者先收靨結癡次蒼老者次收靨結痂從上而下循次而結且更痂潤有光身和無病為順證無疑矣收靨險證險證漿足色不蒼停漿不靨或爛傷痂色紫黑不即脫便調食美不須慌注收靨險證謂漿雖足而色不蒼也停漿不靨謂過期漿不靨結也爛者謂痘顆潰爛也傷者謂癢抓傷損也痂色紫黑者謂痘痂色紫黑也不即脫者謂痘雖結痂不即脫落也已上諸證皆收靨險證若二便調和飲食強美則險化為順不須驚慌也收靨逆證不靨外剝為逆證麩薄黑黯淡白凶痂靨黏連終不脫雖脫乾枯亦死形注不靨外剝者謂痘不待收靨而皮若剝去此名倒靨則為逆證麩薄黯黑者謂痘痂形色若麩之薄若煤之黑淡白者謂痂色淡白無光故皆為凶也黏連不脫者謂膿汁黏連久不脫落也雖脫乾枯者謂痘痂雖脫而乾枯不潤也此二者亦為死形也收靨證治漿足蒼老頂微焦漸次收靨不須療太遲太速皆非吉須辨虛毒濕火條漿清皮嫩為虛象焮赤潰臭毒熱淆漿水浸漬濕淫勝靨速窠燥火煎熬注漿至充足其色蒼老痘頂微焦循次收靨皆收靨順證不須療治也太遲者謂當靨不靨也太速者謂不當靨而靨也皆非吉痘然當辨其所屬或不足或毒盛或屬濕飲或屬火盛須按證治之如漿清皮嫩此屬不足難斂也焮赤潰臭此屬毒盛斂也漿水浸漬此屬濕盛難斂也靨速窠燥此屬火盛難斂早也治者須詳辨之回漿飲皮嫩漿清收斂遲此證當從不足醫回漿參苓白朮草首烏白芍炙黃耆注痘至收斂之時當靨不靨皮嫩漿薄現證身涼手足冷二便不實者此原氣不足虛證也宜用回漿飲補之助其收結回漿飲人參黃耆蜜炙白茯苓白朮土炒何首烏炙白芍炒甘草炙引用煨姜水煎服大連翹飲焮赤潰臭因毒盛大連翹飲諸熱清柴芩歸芍車梔草翹蒡荊防蟬滑通注痘當收斂之時有因毒盛而難斂者更現證焮腫而赤潰爛而臭通身大熱煩渴不寧此毒氣太盛之故也須用大連翹飲以解之大連翹飲連翹去心防風牛蒡子炒研荊芥黃芩當歸蟬蛻柴胡滑石梔子赤芍車前子木通甘草生引加燈心水煎服除濕湯遍體浸漬出水漿證屬濕飲在脾鄉除濕赤苓豬通澤薄桂蒼防白朮羌注痘當收斂之時有因濕盛而不得斂者其現證輕則有孔漏漿重則遍體潰爛肚腹脹小便短皆濕飲為患也須用除濕湯以利之濕除而痘自靨矣除濕湯羌活蒼朮米泔水浸炒防風赤苓豬苓澤瀉白朮土炒木通薄桂引加生薑燈心水煎服清毒散靨速皆因是火傷遍體窠燥異尋常清毒歸芍連丹草翹蒡通花生地黃注痘不當收斂之時忽一時收斂者更現證周身窠粒乾燥口渴發熱煩急不寧此毒火壅盛之故也宜用清毒散主之清毒赦生地赤芍連翹去心金銀花牛蒡子炒研木通黃連當歸丹皮甘草生水煎服結痂落痂順證順證結痂次序脫瘢痕潤滿色紅活額膝遲落不足慮陰陽相濟自然和注結痂順證謂痘結痂依次序而脫落也瘢痕潤滿者謂瘢痕潤而不燥滿而不陷也紅活者謂瘢痕不赤而色紅活也若周身之痂落盡而額膝遲落者不足慮也蓋頭額為孤陽腳膝為孤陰必待陰陽相濟而痂自落矣結痂落痂險證險證結痂不盡脫瘢痕乾燥少紅活餘毒痕色多紫黯痘後必發火瘍疴注結痂險證謂痘結痂不盡脫也瘢痕乾燥者謂瘢痕不潤澤也已上二證固屬險證若飲食強美二便調和雖險不足慮也餘毒者謂痘後餘毒未盡解也其色紫黯者乃餘毒之熱留於血分也瘍疴者謂其毒留久必發痘毒火瘡也結痂落痂逆證逆證結痂痂不脫痂脫痕色白不紅痘盤光紫或枯黯氣乏形羸何以生注結痂逆證謂痘結痂日久不脫也痂已脫落其瘢色純白不紅此血脫虛甚也痘盤光紫者謂痘痕浮光色紫此毒焰外熾也枯黯者謂痘痕乾枯黑黯此毒錮血死也氣乏形羸者謂痘落痂之後其兒元氣虛乏形羸難支將何恃以生也結痂落痂證治痂厚光澤如栗色痂落瘢紅潤滿平乾燥不落血分熱周痂浸淫濕所乘半掀半連肌表熱瘢紫黑焦毒未清色赤凸起為風熱色白凹陷是虛形注痂厚光潤如栗色者謂結痂厚而不薄不幹不濕不黑不白如栗殼色痂落瘢紅澤滿平者謂痂落瘢痕色紅潤澤平滿不凸不凹皆結痂落痂順痘也痂乾燥不落者乃血分熱也圍痂浸淫乃濕邪也半掀半連乃肌表熱也瘢紫黑焦乃毒未清也若赤而凸起乃風熱盛也白而凹陷乃氣血虛也治者須詳辨之涼血解毒湯結痂乾燥不潤澤難落須知血分熱涼血解毒歸地紫丹紅翹芷連甘桔注痘至結痂之後當落不落者現證乾燥不潤根色紅豔渴欲飲冷煩急不寧此毒熱鬱於血分故也宜用涼血解毒湯主之熱清而痂自落矣涼血解毒湯當歸生地黃紫草丹皮紅花連翹去心白芷川黃連甘草生桔梗引加燈心水煎服五苓散結後根腳漏水漿甚則潰爛乃濕傷五苓散中豬澤桂茯苓白朮更相當注痘當已結未落之時根腳浸漏水漿甚則周身潰爛小水短澀大便溏泄此濕勝浸淫之故也宜用五苓散分利之濕除而癡自落矣五苓散豬苓澤瀉肉桂茯苓白朮土炒引加燈心水煎服荊防解毒湯半掀半連在表熱似落不落勢纏綿荊防解毒芍地草金銀通桔骨翹攢注痘當落痂之後宜落不落其痂一半掀起一半咬緊現證身熱乾燥肌膚紅赤此熱在肌表之證宜荊防解毒湯主之荊防解毒湯荊芥防風赤芍藥生地黃甘草生金銀花木通桔梗地骨皮連翹去心引加生薑水煎服黃連解毒加味湯痂落瘢紫黑與焦毒熱鬱結未曾消解毒芩連梔子柏加丹生地草金翹注痘當落癡之後其瘢或紫或焦或黑現證通身壯熱煩渴不寧皆因灌溉時漿未充足毒氣未盡化故也均宜黃連解毒湯加生地連翹丹皮金銀花甘草主之黃連解毒加味湯黃連黃芩梔子黃柏丹皮生地黃甘草生金銀花連翹去心引加燈心水煎服解毒防風湯落後瘢赤作腫形內熱未解復受風解毒黃芩生地草翹蒡荊防金芍升注痘當落痂之後瘢凸不平色赤而豔或發熱或作癢皆血有餘熱復外感於風故也宜解毒防風湯主之解毒防風湯黃芩生地黃甘草連翹去心牛蒡子炒研荊芥防風金銀花赤芍升麻引加生薑水煎服十全大補湯落痂凹陷最可虞色白形羸氣血虛大補參苓白朮草歸芎芍地桂黃耆注痘當落痂之後其瘢凹而不起色白不紅現證精神倦軟飲食懶少此氣血兩虛之證也宜十全大補湯主之十全大補湯人參茯苓白朮土炒甘草炙當歸川芎白芍炒熟地黃肉桂黃耆蜜炙引加煨姜水煎服
